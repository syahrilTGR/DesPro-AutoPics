; --- AUTOPICS PROJECT CONFIGURATION ---
; 
; COMMANDS TO UPLOAD (Standard):
;   Gate   : pio run -e esp32dev -t upload
;   Camera : pio run -e esp32cam -t upload
;
; COMMANDS TO UPLOAD (WINDOWS - Full Path):
;   Gate   : %USERPROFILE%\.platformio\penv\Scripts\pio run -e esp32dev -t upload
;   Camera : %USERPROFILE%\.platformio\penv\Scripts\pio run -e esp32cam -t upload
;
; COMMANDS TO UPLOAD (MAC - Full Path):
;   Gate   : ~/.platformio/penv/bin/pio run -e esp32dev -t upload
;   Camera : ~/.platformio/penv/bin/pio run -e esp32cam -t upload
;
; MONITOR COMMAND:
;   pio device monitor
; --------------------------------------

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
; Fokus hanya ke kode Pintu Gate
build_src_filter = +<main.cpp>
lib_deps =
    madhephaestus/ESP32Servo
    tzapu/WiFiManager
    mobizt/Firebase ESP32 Client
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = send_on_enter

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
; Fokus hanya ke kode Kamera
build_src_filter = +<main-espcam.cpp>
build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
lib_deps =
    yoursunny/esp32cam
    tzapu/WiFiManager
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = send_on_enter
